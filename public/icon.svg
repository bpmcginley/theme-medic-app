<svg width="1200" height="1200" viewBox="0 0 1200 1200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16a34a"/>
      <stop offset="1" stop-color="#15803d"/>
    </linearGradient>
  </defs>
  <!-- rounded-square background -->
  <rect width="1200" height="1200" rx="260" fill="url(#bg)"/>
  <!-- medical cross -->
  <g fill="#ffffff">
    <rect x="510" y="250" width="180" height="700" rx="40"/>
    <rect x="250" y="510" width="700" height="180" rx="40"/>
  </g>
  <!-- speed/health pulse line across the cross -->
  <path d="M180 600 H470 L540 430 L640 770 L720 600 H1020"
        fill="none" stroke="#0f1115" stroke-width="46"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.92"/>
</svg>
